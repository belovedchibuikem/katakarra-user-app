workflows:
  katakarra-android:
    name: KataKarra Android
    max_build_duration: 60
    environment:
      flutter: 3.10.0
      java: 17
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android App Bundle
        script: flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/*.apk
